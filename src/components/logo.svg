<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Desk base — the bottom rail of Bush's memex desk -->
  <rect x="4" y="30" width="32" height="2.5" rx="1.25" fill="currentColor"/>

  <!-- Left screen — left viewing panel on the memex desk -->
  <rect x="4" y="12" width="11" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left screen inner glow / content lines -->
  <rect x="6.5" y="15" width="6" height="1.2" rx="0.6" fill="currentColor" opacity="0.4"/>
  <rect x="6.5" y="17.5" width="4" height="1.2" rx="0.6" fill="currentColor" opacity="0.25"/>
  <rect x="6.5" y="20" width="5" height="1.2" rx="0.6" fill="currentColor" opacity="0.25"/>

  <!-- Right screen — right viewing panel -->
  <rect x="25" y="12" width="11" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Right screen inner content lines -->
  <rect x="27.5" y="15" width="6" height="1.2" rx="0.6" fill="currentColor" opacity="0.4"/>
  <rect x="27.5" y="17.5" width="3.5" height="1.2" rx="0.6" fill="currentColor" opacity="0.25"/>
  <rect x="27.5" y="20" width="5" height="1.2" rx="0.6" fill="currentColor" opacity="0.25"/>

  <!-- Associative trail — the core concept of the memex -->
  <line x1="15" y1="19" x2="25" y2="19" stroke="currentColor" stroke-width="1.2" stroke-dasharray="1.5 2" opacity="0.6"/>

  <!-- Trail node — the moment of association -->
  <circle cx="20" cy="19" r="2.2" fill="currentColor"/>
  <circle cx="20" cy="19" r="0.9" fill="var(--bg)"/>

  <!-- Leg connectors from screens to base -->
  <line x1="9.5" y1="26" x2="9.5" y2="30" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
  <line x1="30.5" y1="26" x2="30.5" y2="30" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>

  <!-- Microfilm reel hint — small circle top left, subtle nod to the microfilm storage -->
  <circle cx="20" cy="6.5" r="3" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
  <circle cx="20" cy="6.5" r="1" fill="currentColor" opacity="0.5"/>
</svg>
